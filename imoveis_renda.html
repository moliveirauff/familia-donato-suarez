<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="only light">
  <meta name="supported-color-schemes" content="light">
  <title>🏠 Imóveis de Renda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <style>
    /* Force Light Mode variables as default, override if class is present */
    :root {
      color-scheme: only light !important;
      isolation: isolate;
      --bg: #f7fafc;
      --text: #2d3748;
      --surface: #ffffff;
      --card-bg: var(--surface);
      --border: #e2e8f0;
      --text-muted: #718096;
      --subtext: var(--text-muted);
      --primary: #667eea;
      --accent: var(--primary);
      --success: #48bb78;
      --warning: #ed8936;
      --danger: #f56565;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }
    
    /* Apply Dark Mode only when class is present */
    body.dark-mode {
      color-scheme: only dark !important;
      --bg: #1a202c;
      --text: #f7fafc;
      --surface: #2d3748;
      --card-bg: var(--surface);
      --border: #4a5568;
      --text-muted: #cbd5e0;
      --subtext: var(--text-muted);
      --primary: #7f9cf5;
      --accent: var(--primary);
      background-image: none;
      background-color: var(--bg);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background-color: var(--bg);
      min-height: 100vh;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      transition: background-color 0.3s, color 0.3s;
      padding: 10px 10px 60px 10px;
      min-height: 100vh;
    }

    /* Header */
    #theme-toggle {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.05); border: none; font-size: 1.2rem; cursor: pointer;
      padding: 8px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s;
    }
    body.dark-mode #theme-toggle { background: rgba(255,255,255,0.1); }
    body:not(.dark-mode) #theme-toggle { background: rgba(0,0,0,0.05); }
    .nav-link {
      text-decoration: none;
      color: var(--primary);
      font-size: 0.9rem;
      margin: 10px 0 0 4px;
      display: inline-block;
    }
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 800;
      margin: 10px 44px 20px 44px;
      color: var(--text);
    }

    /* KPIs */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi-label {
      font-size: 0.6rem;
      font-weight: 800;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      order: 1;
    }
    .kpi-value {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
      order: 2;
    }
    .kpi-sub {
      font-size: 0.65rem;
      color: var(--text-muted);
      font-weight: 600;
      order: 3;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      transition: background-color 0.3s, border-color 0.3s;
    }
    .card-header {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .card-title { 
      display: flex; 
      align-items: center; 
      gap: 6px;
      text-align: center;
      width: 100%;
      justify-content: center;
    }

    /* Chart */
    .chart-container {
      position: relative;
      height: 450px;
      width: 100%;
    }

    /* Loading */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      color: white;
      font-weight: bold;
      backdrop-filter: blur(4px);
    }
    .hidden { display: none !important; }

    /* Last update */
    .last-update {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin: -12px 0 18px 0;
      font-weight: 500;
    }

    /* Desktop */
    @media (min-width: 768px) {
      body { padding: 16px 24px 60px 24px; }
      h1 { font-size: 1.75rem; }
      .kpi-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }
  </style>
</head>
<body>

<div id="loading">Carregando dados...</div>

<button id="theme-toggle" onclick="toggleTheme()">🌙</button>
<a href="index.html" class="nav-link">← Voltar</a>
<h1>🏠 Imóveis de Renda</h1>
<p class="last-update">Atualizado em: <span id="lastUpdate">—</span></p>

<main>
  <!-- KPIs -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <span class="kpi-label">🏠 Imóveis</span>
      <span class="kpi-value" id="kpiNumImoveis">—</span>
      <span class="kpi-sub">Propriedades</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">💰 Valor de Mercado</span>
      <span class="kpi-value" id="kpiValorMercado">—</span>
      <span class="kpi-sub">Atual</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">📅 Aluguéis 12M</span>
      <span class="kpi-value" id="kpiAlugueis">—</span>
      <span class="kpi-sub" id="kpiDY">—</span>
    </div>
    <div class="kpi-card">
      <span class="kpi-label">📈 Rentabilidade</span>
      <span class="kpi-value" id="kpiRentabilidade">—</span>
      <span class="kpi-sub">Total Acumulada</span>
    </div>
  </div>

  <!-- Gráfico 1: Valor do Imóvel por Ano -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>📊</span> Valor do Imóvel por Ano</div>
    </div>
    <div class="chart-container">
      <canvas id="chartValor"></canvas>
    </div>
  </div>

  <!-- Gráfico 2: Total de Aluguéis Recebidos por Ano -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>💵</span> Total de Aluguéis Recebidos por Ano</div>
    </div>
    <div class="chart-container">
      <canvas id="chartAlugueis"></canvas>
    </div>
  </div>

  <!-- Gráfico 3: Rentabilidade Acumulada por Ano -->
  <div class="card">
    <div class="card-header">
      <div class="card-title"><span>📈</span> Rentabilidade Acumulada por Ano</div>
    </div>
    <div class="chart-container">
      <canvas id="chartRentabilidade"></canvas>
    </div>
  </div>
</main>

<script>
// === STATE ===
let data = null;
let charts = {};

// === INIT ===
async function init() {
  try {
    const response = await fetch('data/imoveis_renda_dashboard.json');
    data = await response.json();

    // Última data dos dados
    try {
      const gen = data.metadata && data.metadata.data_geracao;
      if (gen) {
        const d = new Date(gen);
        document.getElementById('lastUpdate').textContent = d.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
      }
    } catch(e) {}

    renderAll();
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    alert('Erro ao carregar dados: ' + e.message);
    console.error(e);
  }
}

function renderAll() {
  updateKPIs();
  renderValor();
  renderAlugueis();
  renderRentabilidade();
}

// === KPIS ===
function updateKPIs() {
  const kpis = data.kpis;
  
  setTxt('kpiNumImoveis', kpis.num_imoveis);
  setTxt('kpiValorMercado', fmt(kpis.valor_mercado_atual));
  setTxt('kpiAlugueis', fmt(kpis.alugueis_12m));
  setTxt('kpiDY', `DY 12M: ${kpis.dy_12m.toFixed(2)}%`);
  setTxt('kpiRentabilidade', kpis.rentabilidade_total.toFixed(2) + '%');
}

// === GRÁFICO 1: VALOR POR ANO ===
function renderValor() {
  const ctx = getCtx('chartValor');
  const series = data.series.valor_por_ano;
  
  const anos = series.map(s => s.ano);
  const valores = series.map(s => s.valor);

  if (charts.valor) charts.valor.destroy();
  charts.valor = new Chart(ctx, {
    type: 'line',
    data: {
      labels: anos,
      datasets: [{
        label: 'Valor de Mercado',
        data: valores,
        borderColor: '#10b981',
        backgroundColor: 'rgba(16, 185, 129, 0.1)',
        borderWidth: 3,
        fill: true,
        tension: 0.4,
        pointRadius: 5,
        pointHoverRadius: 7,
        pointBackgroundColor: '#10b981',
        pointBorderColor: '#fff',
        pointBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => fmt(ctx.raw)
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: getTextColor()
          },
          grid: {
            color: getBorderColor()
          }
        },
        y: {
          ticks: {
            callback: (v) => compactFmt(v),
            color: getTextColor()
          },
          grid: {
            color: getBorderColor()
          }
        }
      },
      animation: {
        duration: 1000,
        easing: 'easeInOutQuart'
      }
    }
  });
}

// === GRÁFICO 2: ALUGUÉIS POR ANO ===
function renderAlugueis() {
  const ctx = getCtx('chartAlugueis');
  const series = data.series.alugueis_por_ano;
  
  const anos = series.map(s => s.ano);
  const valores = series.map(s => s.total);

  if (charts.alugueis) charts.alugueis.destroy();
  charts.alugueis = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: anos,
      datasets: [{
        label: 'Aluguéis Recebidos',
        data: valores,
        backgroundColor: '#3b82f6',
        borderRadius: 8,
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => fmt(ctx.raw)
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: getTextColor()
          },
          grid: {
            display: false
          }
        },
        y: {
          ticks: {
            callback: (v) => compactFmt(v),
            color: getTextColor()
          },
          grid: {
            color: getBorderColor()
          }
        }
      },
      animation: {
        duration: 1000,
        easing: 'easeInOutQuart'
      }
    }
  });
}

// === GRÁFICO 3: RENTABILIDADE ACUMULADA ===
function renderRentabilidade() {
  const ctx = getCtx('chartRentabilidade');
  const series = data.series.rentabilidade_acumulada;
  
  const anos = series.map(s => s.ano);
  const percentuais = series.map(s => s.percentual);

  // Cores dinâmicas: verde positivo, vermelho negativo
  const pointColors = percentuais.map(p => p >= 0 ? '#10b981' : '#ef4444');
  const borderColor = '#667eea';

  if (charts.rentabilidade) charts.rentabilidade.destroy();
  charts.rentabilidade = new Chart(ctx, {
    type: 'line',
    data: {
      labels: anos,
      datasets: [{
        label: 'Rentabilidade (%)',
        data: percentuais,
        borderColor: borderColor,
        backgroundColor: 'rgba(102, 126, 234, 0.1)',
        borderWidth: 3,
        fill: false,
        tension: 0.4,
        pointRadius: 6,
        pointHoverRadius: 8,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.raw.toFixed(2)}%`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: getTextColor()
          },
          grid: {
            color: getBorderColor()
          }
        },
        y: {
          ticks: {
            callback: (v) => v.toFixed(1) + '%',
            color: getTextColor()
          },
          grid: {
            color: getBorderColor()
          }
        }
      },
      animation: {
        duration: 1000,
        easing: 'easeInOutQuart'
      }
    },
    plugins: [{
      // Plugin customizado para linha horizontal no zero
      beforeDraw: (chart) => {
        const ctx = chart.ctx;
        const yScale = chart.scales.y;
        const yZero = yScale.getPixelForValue(0);
        const xScale = chart.scales.x;
        
        ctx.save();
        ctx.beginPath();
        ctx.strokeStyle = '#95a5a6';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.moveTo(xScale.left, yZero);
        ctx.lineTo(xScale.right, yZero);
        ctx.stroke();
        ctx.restore();
      }
    }]
  });
}

// === UTILS ===
function fmt(n) { 
  return n.toLocaleString('pt-BR', {style:'currency', currency:'BRL'}); 
}

function compactFmt(n) { 
  return Intl.NumberFormat('pt-BR', { 
    notation: "compact", 
    compactDisplay: "short" 
  }).format(n); 
}

function setTxt(id, t) { 
  document.getElementById(id).textContent = t; 
}

function getCtx(id) { 
  return document.getElementById(id).getContext('2d'); 
}

function getTextColor() {
  return getComputedStyle(document.body).getPropertyValue('--text').trim();
}

function getBorderColor() {
  return getComputedStyle(document.body).getPropertyValue('--border').trim();
}

// === THEME HANDLING ===
function updateMetaThemeColor(isDark) {
  const color = isDark ? '#1a202c' : '#f7fafc';
  const scheme = isDark ? 'only dark' : 'only light';
  
  let metaTheme = document.querySelector('meta[name="theme-color"]');
  if (!metaTheme) {
    metaTheme = document.createElement('meta');
    metaTheme.name = 'theme-color';
    document.head.appendChild(metaTheme);
  }
  metaTheme.content = color;

  let metaScheme = document.querySelector('meta[name="color-scheme"]');
  if (!metaScheme) {
    metaScheme = document.createElement('meta');
    metaScheme.name = 'color-scheme';
    document.head.appendChild(metaScheme);
  }
  metaScheme.content = scheme;
}

function initTheme() {
  const savedTheme = localStorage.getItem('theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  
  let isDark = false;
  if (savedTheme === 'dark') {
    isDark = true;
  } else if (savedTheme === 'light') {
    isDark = false;
  } else if (prefersDark) {
    isDark = true;
  }
  
  if (isDark) {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-toggle').textContent = '☀️';
  } else {
    document.body.classList.remove('dark-mode');
    document.getElementById('theme-toggle').textContent = '🌙';
  }
  updateMetaThemeColor(isDark);
}

function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-toggle').textContent = isDark ? '☀️' : '🌙';
  updateMetaThemeColor(isDark);
  
  // Re-render charts para atualizar cores
  setTimeout(renderAll, 50);
}

// Inicializar tema ANTES de tudo
initTheme();

init();
</script>
</body>
</html>
